<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3P Relatórios</title>
    <style>
      /* ── TOKENS ────────────────────────────────────────── */
      [data-theme="dark"] {
        --bg: #161616;
        --surface: #202020;
        --surface2: #1a1a1a;
        --border: #2e2e2e;
        --border-hover: #444;
        --text: #e8e8e8;
        --muted: #999;
        --hint: #666;
        --brand: #8833ff;
        --brand-dim: rgba(136,51,255,0.16);
        --brand-border: rgba(136,51,255,0.5);
        --danger: #ff6b6b;
        --danger-dim: rgba(255,107,107,0.10);
        --green: #34d399;
        --green-dim: rgba(52,211,153,0.10);
        --green-border: rgba(52,211,153,0.25);
        --amber: #f59e0b;
        --amber-dim: rgba(245,158,11,0.10);
      }
      [data-theme="light"] {
        --bg: #f5f5f5;
        --surface: #fff;
        --surface2: #f0f0f0;
        --border: #e5e5e5;
        --border-hover: #bbb;
        --text: #0a0a0a;
        --muted: #666;
        --hint: #999;
        --brand: #6515FF;
        --brand-dim: rgba(101,21,255,0.08);
        --brand-border: rgba(101,21,255,0.25);
        --danger: #e04040;
        --danger-dim: rgba(224,64,64,0.08);
        --green: #059669;
        --green-dim: rgba(5,150,105,0.08);
        --green-border: rgba(5,150,105,0.25);
        --amber: #d97706;
        --amber-dim: rgba(217,119,6,0.08);
      }
    </style>
    <script>
      // ── EMBED DETECTION + LIVE THEME SYNC ──────────────────────────
      (function(){
        var params = new URLSearchParams(location.search);
        var isEmbed = params.get('embedded') === '1' || window.self !== window.top;
        if (isEmbed) document.documentElement.classList.add('embedded');
        var theme = params.get('theme');
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.setAttribute('data-theme', theme);
        }
        // Listener: hub envia { type:'theme', theme:'dark'|'light' } via postMessage
        window.addEventListener('message', function(ev){
          var d = ev.data;
          if (d && d.type === 'theme' && (d.theme === 'dark' || d.theme === 'light')) {
            document.documentElement.setAttribute('data-theme', d.theme);
          }
        });
      })();
    </script>
    <style>
      /* ── EMBED MODE ── header horizontal substitui sidebar ── */
      html.embedded body { background: transparent; }
      html.embedded .sidebar { display: none !important; }
      html.embedded .app-layout-embed {
        flex-direction: column;
        min-height: 100vh;
      }
      html.embedded .main-content { padding-top: 0; }
      /* Header */
      html.embedded .embed-header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        background: var(--bg);
        border-bottom: 0.5px solid var(--border);
        backdrop-filter: blur(8px);
      }
      html.embedded .embed-header-nav {
        display: flex;
        gap: 4px;
        background: var(--surface2);
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 4px;
      }
      html.embedded .embed-header-tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 7px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      html.embedded .embed-header-tab:hover {
        background: var(--surface);
        color: var(--text);
      }
      html.embedded .embed-header-tab.active {
        background: var(--brand);
        color: #fff;
      }
      html.embedded .embed-header-tab-icon {
        font-size: 13px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
